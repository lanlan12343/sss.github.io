<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XML 状态解析器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f5f7fa;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2 { margin-top: 0; color: #333; }
        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            box-sizing: border-box;
            border: 1px solid #ccd0d5;
            border-radius: 6px;
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
        }
        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #0056b3; }
        .result-box {
            margin-top: 25px;
            padding: 15px;
            border-radius: 6px;
            display: none;
        }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .data-item { margin: 8px 0; font-size: 16px; }
        .data-label { font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>XML 状态解析器</h2>
    <p style="color: #666; font-size: 14px;">请在下方输入您的 XML 数据：</p>
    
    <textarea id="xmlInput"><?xml version="1.0" encoding="UTF-8"?> <Result> <Status>OK</Status> <Code></Code> </Result></textarea>
    
    <button onclick="parseXML()">立即解析 XML</button>
    
    <div id="result" class="result-box"></div>
</div>

<script>
function parseXML() {
    const xmlText = document.getElementById('xmlInput').value.trim();
    const resultDiv = document.getElementById('result');
    
    // 重置显示
    resultDiv.style.display = 'none';
    resultDiv.className = 'result-box';
    resultDiv.innerHTML = '';

    if (!xmlText) {
        showResult('请输入 XML 数据！', 'error');
        return;
    }

    try {
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xmlText, "text/xml");
        
        // 检查浏览器自带的解析错误提示
        if (xmlDoc.getElementsByTagName("parsererror").length > 0) {
            showResult('XML 格式不正确，解析失败！', 'error');
            return;
        }
        
        // 安全提取节点内容
        const statusEl = xmlDoc.getElementsByTagName("Status")[0];
        const codeEl = xmlDoc.getElementsByTagName("Code")[0];
        
        const status = statusEl ? statusEl.textContent.trim() : "未找到Status标签";
        const code = (codeEl && codeEl.textContent) ? codeEl.textContent.trim() : "(无代码)";
        
        // 根据状态渲染不同的样式
        if (status === 'OK') {
            showResult(`
                <div class="data-item"><span class="data-label">解析状态：</span>成功 ✅</div>
                <div class="data-item"><span class="data-label">Status 值：</span>${status}</div>
                <div class="data-item"><span class="data-label">Code 值：</span>${code}</div>
            `, 'success');
        } else {
            showResult(`
                <div class="data-item"><span class="data-label">解析状态：</span>失败 ❌</div>
                <div class="data-item"><span class="data-label">Status 值：</span>${status}</div>
                <div class="data-item"><span class="data-label">Code 值：</span>${code}</div>
            `, 'error');
        }
        
    } catch (e) {
        showResult('发生未知错误：' + e.message, 'error');
    }
}

function showResult(htmlContent, type) {
    const resultDiv = document.getElementById('result');
    resultDiv.className = `result-box ${type}`;
    resultDiv.innerHTML = htmlContent;
    resultDiv.style.display = 'block';
}
</script>

</body>
</html>
